<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masotto - Audit 3-Matrix Operativo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-dark: #080c10; --panel-light: #131b24; --border: rgba(255,255,255,0.1); }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-dark); color: white; margin: 0; min-height: 100vh; overflow: auto !important; height: auto !important; }
        
        .main { flex: 1; padding: 2rem; background: radial-gradient(circle at top right, #112a2e 0%, #080c10 40%); overflow: visible !important; min-height: 100vh; }
        
        .audit-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 1.5rem; margin-top: 1.5rem; }
        @media (min-width: 768px) { .audit-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1280px) { .audit-grid { grid-template-columns: repeat(3, 1fr); } }

        .asset-card { background: rgba(15,21,26,0.9); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; position: relative; display: flex; flex-direction: column; gap: 1rem; transition: 0.2s; cursor: pointer; }
        .asset-card:hover { transform: translateY(-3px); border-color: #2dd4bf; background: #1a2430; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .brand-vote { position: absolute; top: 1.5rem; right: 1.5rem; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; padding: 6px 12px; border-radius: 8px; letter-spacing: 0.5px; border: 1px solid; }
        .vote-keep { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: #10b981; }
        .vote-monitor { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: #f59e0b; }
        .vote-replace { background: rgba(217, 70, 239, 0.15); color: #d946ef; border-color: #d946ef; box-shadow: 0 0 10px rgba(217, 70, 239, 0.2); }

        .incident-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(239,68,68,0.2); color: #ef4444; font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(239,68,68,0.4); margin-top: 5px;}

        /* Le 3 Barre */
        .matrix-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
        .m-labels { display: flex; justify-content: space-between; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; }
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; }
        .bar-time { background: #2dd4bf; } 
        .bar-perf { background: #d946ef; transition: width 0.5s ease-out; } 
        .bar-energy { background: #f59e0b; box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); } 

        .risk-zone { background: rgba(0,0,0,0.4); border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; display: grid; grid-template-columns: 1fr; gap: 8px; }
        .risk-item { display: flex; justify-content: space-between; font-size: 0.7rem; align-items: center; }
        .risk-lbl { color: #64748b; font-weight: 700; text-transform: uppercase; }
        .risk-val { font-weight: 800; }
        .r-low { color: #10b981; } .r-med { color: #f59e0b; } .r-high { color: #ef4444; } .r-crit { color: #d946ef; }

        /* Modal Styles */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #0f151a; border: 1px solid #d946ef; width: 95%; max-width: 500px; padding: 2rem; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #94a3b8; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        input, select { width: 100%; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; color: white; font-size: 0.9rem; }
        
        /* Preset Option styling */
        .preset-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; }
        .preset-btn:hover { background: rgba(217, 70, 239, 0.1); border-color: #d946ef; }
        .preset-title { font-weight: 700; font-size: 0.85rem; color: white; }
        .preset-sub { font-size: 0.7rem; color: #94a3b8; }
        .preset-score { font-size: 0.7rem; font-family: monospace; color: #ef4444; font-weight: bold; }

        .btn { padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; width: 100%; text-align: center; border: none; }
        .btn-danger { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #ef4444; }
        .btn-danger:hover { background: #ef4444; color: white; }
        .btn-success { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #10b981; }
        .btn-success:hover { background: #10b981; color: white; }
        .btn-close { background: transparent; border: 1px solid var(--border); color: #94a3b8; }

        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    </style>
<style id="masotto-sidebar-css">
:root{ --bg-dark:#0b1220; --border:rgba(255,255,255,.10); --brand:#004D54; --accent:#2dd4bf; }
.ms-sidebar{ position:fixed; inset:0 auto 0 0; width:260px; background:rgba(15,23,42,.96); border-right:1px solid var(--border); padding:20px; z-index:50; overflow-y:auto; }
.ms-main{margin-left:260px; min-height:100vh; display:flex; flex-direction:column;}
@media (max-width: 900px){ .ms-sidebar{transform:translateX(-105%); transition:.2s;} .ms-sidebar.open{transform:translateX(0);} .ms-main{margin-left:0;} .ms-topbar{position:sticky; top:0; z-index:40; backdrop-filter: blur(10px); background:rgba(11,18,32,.75); border-bottom:1px solid var(--border);} }
.ms-nav a{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:#94a3b8; font-weight:600; text-decoration:none; }
.ms-nav a:hover{background:rgba(255,255,255,.05); color:#fff;} .ms-nav a.active{background:var(--brand); color:var(--accent); border-left:3px solid var(--accent);}
.ms-chip{font:600 10px monospace; color:var(--accent); background:rgba(45,212,191,.10); border:1px solid rgba(45,212,191,.25); padding:2px 8px; border-radius:999px; display:inline-block;}
</style>
    <script src="masotto_db.js"></script>
</head>
<body>

    <div>
        <main class="main">
            <div class="mb-8">
                <h2 class="text-3xl font-bold text-white">Audit Operativo (3-Matrix)</h2>
                <div class="text-sm text-gray-400 mt-1">Clicca su un asset per segnalare un guasto rapido tramite i Preset Operativi.</div>
            </div>
            
            <div class="audit-grid" id="audit-grid"></div>
        </main>
    </div>

    <div id="incidentModal" class="modal">
        <div class="modal-box">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white flex items-center gap-2" id="modalTitle"><i data-lucide="clipboard-list" class="text-[#d946ef]"></i> Audit Asset</h3>
            </div>
            
            <input type="hidden" id="i-id">
            <input type="hidden" id="i-source">
            
            <div class="form-group mb-6 border-b border-white/10 pb-4">
                <div id="i-asset-name" class="font-bold text-xl text-teal-400">Nome Asset</div>
                <div id="i-asset-type" class="text-xs text-gray-400">Categoria</div>
            </div>

            <div id="preset-list" class="mb-6">
                <label>Casistiche Comuni (Seleziona per applicare)</label>
                </div>

            <div class="form-group border-t border-white/10 pt-4">
                <label>Oppure compila manualmente</label>
                <input type="text" id="i-desc" placeholder="Descrivi il problema non in lista...">
                <select id="i-severity" class="mt-2">
                    <option value="0">Nessun impatto (-0%)</option>
                    <option value="15">Lieve usura (-15% Performance)</option>
                    <option value="40">Guasto Grave (-40% Performance)</option>
                    <option value="80">Critico / Non usabile (-80% Performance)</option>
                </select>
            </div>

            <div class="flex flex-col gap-3 mt-6">
                <button onclick="applyDamageManual()" class="btn btn-danger"><i data-lucide="trending-down" class="inline w-4 h-4"></i> Registra Danno Manuale</button>
                <button onclick="healAsset()" id="btn-heal" class="btn btn-success hidden"><i data-lucide="wrench" class="inline w-4 h-4"></i> Segna come Riparato (Reset 100%)</button>
                <button onclick="closeModal()" class="btn btn-close">Annulla</button>
            </div>
        </div>
    </div>

    <script>
        const CURRENT_YEAR = new Date().getFullYear();
        let assetsMobile = [];
        let assetsStruct = [];
        let unifiedList = [];

        // --- DIZIONARIO PRESET DI GUASTO PER CATEGORIA ---
        const AUDIT_PRESETS = {
            "Involucro": [
                { title: "Segni da valigia / Macchie lievi", desc: "Necessita ritocco pittura", penalty: 15 },
                { title: "Crepe intonaco / Danni gravi", desc: "Necessita stuccatura e pittura intera parete", penalty: 40 }
            ],
            "Infissi": [
                { title: "Cerniere rumorose / Dure", desc: "Da lubrificare (WD40)", penalty: 15 },
                { title: "Guarnizione rotta / Spifferi", desc: "Perdita isolamento termico", penalty: 40 },
                { title: "Tapparella bloccata", desc: "Intervento su cinghia o motore", penalty: 80 }
            ],
            "Impianti": [
                { title: "Scarico lento / Ingorgato", desc: "Da sbloccare con disgorgante o molla", penalty: 30 },
                { title: "Presa elettrica non funzionante", desc: "Da sostituire o verificare cavi", penalty: 40 },
                { title: "Perdita idraulica", desc: "Macchia d'acqua sotto lavello/doccia", penalty: 80 }
            ],
            "Bagno": [
                { title: "Silicone annerito / Muffa", desc: "Da rimuovere e risiliconare", penalty: 20 },
                { title: "Soffione doccia otturato", desc: "Decalcificazione anticalcare necessaria", penalty: 30 },
                { title: "Miscelatore perde / Rotto", desc: "Cartuccia da sostituire", penalty: 60 }
            ],
            "Sigilli": [
                { title: "Infiltrazione d'acqua", desc: "Silicone tagliato o assente", penalty: 40 }
            ],
            "Clima": [
                { title: "Cattivo odore / Filtri sporchi", desc: "Sanificazione batterie richiesta", penalty: 25 },
                { title: "Non raffredda / Pompa in blocco", desc: "Rischio gas esaurito o scheda rotta", penalty: 80 }
            ],
            "Esterni": [
                { title: "Scarico balcone otturato", desc: "Foglie e terra da rimuovere", penalty: 30 },
                { title: "Parapetto traballante", desc: "Problema sicurezza critico", penalty: 90 }
            ],
            // --- Elettrodomestici (Mobile) ---
            "Frigorifero": [
                { title: "Ghiaccio nel freezer", desc: "Sbrinamento manuale richiesto", penalty: 20 },
                { title: "Guarnizione sportello allentata", desc: "Dispersione energetica alta", penalty: 40 },
                { title: "Motore rumoroso / Non raffredda", desc: "Sostituzione imminente", penalty: 80 }
            ],
            "Lavastoviglie": [
                { title: "Stoviglie non escono pulite", desc: "Sale/Brillantante assenti o filtro sporco", penalty: 30 },
                { title: "Errore scarico (Acqua sul fondo)", desc: "Pompa bloccata", penalty: 60 }
            ],
            "Lavasciuga": [
                { title: "Oblò perde acqua", desc: "Guarnizione pizzicata", penalty: 40 },
                { title: "Centrifuga rumorosa / Vibra", desc: "Ammortizzatori scarichi", penalty: 60 },
                { title: "Scheda madre Errore F", desc: "Fermo macchina", penalty: 90 }
            ],
            "Piano Cottura": [
                { title: "Vetro graffiato", desc: "Danno estetico", penalty: 15 },
                { title: "Una zona a induzione non va", desc: "Scheda potenza danneggiata", penalty: 50 }
            ],
            "TV 43": [
                { title: "Telecomando guasto", desc: "Sostituzione pile o telecomando", penalty: 20 },
                { title: "Righe sullo schermo", desc: "Pannello danneggiato", penalty: 80 }
            ]
        };

        function getPresetsForCategory(cat, name) {
            // Cerca prima per Categoria (Strutturali), se non c'è cerca per Nome (Mobili)
            if(AUDIT_PRESETS[cat]) return AUDIT_PRESETS[cat];
            if(AUDIT_PRESETS[name]) return AUDIT_PRESETS[name];
            
            // Generici di fallback
            return [
                { title: "Usura estetica lieve", desc: "Graffi o piccoli segni visibili", penalty: 15 },
                { title: "Malfunzionamento parziale", desc: "Fa rumore o non rende al 100%", penalty: 40 },
                { title: "Guasto totale", desc: "Inutilizzabile, richiede tecnico", penalty: 80 }
            ];
        }

        function loadData() {
            try { assetsMobile = JSON.parse(localStorage.getItem('masotto_assets_mobile_db')) || window.MASOTTO_DB.assets_mobile || []; } catch(e) {}
            try { assetsStruct = JSON.parse(localStorage.getItem('masotto_structural_assets_db')) || window.MASOTTO_DB.structural_assets || []; } catch(e) {}

            unifiedList = [];

            assetsMobile.forEach(a => {
                let year = a.acquisto ? parseInt(a.acquisto.substring(0,4)) : CURRENT_YEAR;
                unifiedList.push({
                    id: a.id, name: a.tipo, type: `${a.marca} ${a.modello}`, category: 'Elettrodomestico', source: 'mobile',
                    year: year, life_expectancy: 10, isElectrical: true, cost: parseFloat(a.prezzo_eur||0),
                    penalty: a.penalty || 0, incident_desc: a.incident_desc || ""
                });
            });

            assetsStruct.forEach(a => {
                let yearMatch = a.stato_check ? a.stato_check.match(/\d{4}/) : null;
                let year = yearMatch ? parseInt(yearMatch[0]) : 2023;
                unifiedList.push({
                    id: a.id, name: a.nome, type: a.descrizione, category: a.categoria, source: 'struct',
                    year: year, life_expectancy: a.life_years || 15, isElectrical: a.nome.includes('Imp.') || a.nome.includes('Clima'), cost: 1000,
                    penalty: a.penalty || 0, incident_desc: a.incident_desc || ""
                });
            });

            renderAudit(unifiedList);
        }

        function calculateMatrix(asset) {
            let age = CURRENT_YEAR - asset.year;
            let chrono = Math.max(0, 100 - (age / asset.life_expectancy) * 100);
            let basePerf = Math.max(0, 100 - (age * 3)); 
            let energy = asset.isElectrical ? Math.max(0, 100 - (age * 8)) : 100; 
            
            if(asset.id === "EQ041") { chrono = 30; basePerf = 85; energy = 40; } // Miele

            // Sottrae il danno
            let perf = Math.max(0, basePerf - (asset.penalty || 0));

            let ammortamento = chrono > 50 ? 'Basso' : (chrono > 20 ? 'Medio' : 'CRITICO');
            let ammortamentoColor = chrono > 50 ? 'r-low' : (chrono > 20 ? 'r-med' : 'r-crit');

            let impatto = perf > 80 ? 'Basso' : (perf > 50 ? 'Medio' : 'ALTO');
            let impattoColor = perf > 80 ? 'r-low' : (perf > 50 ? 'r-med' : 'r-high');

            let finRisk = 'Basso'; let finColor = 'r-low';
            if(energy < 50 || (chrono < 30 && asset.cost > 300) || asset.penalty >= 40) { finRisk = 'MASSIMO'; finColor = 'r-crit'; }
            else if(energy < 75 || asset.penalty > 0) { finRisk = 'Medio'; finColor = 'r-med'; }

            let vote = "KEEP"; let voteClass = "vote-keep";
            if (impatto === 'ALTO' || finRisk === 'MASSIMO') { vote = "REPLACE"; voteClass = "vote-replace"; } 
            else if (chrono < 40 || perf < 70) { vote = "MONITOR"; voteClass = "vote-monitor"; }

            return { chrono, perf, energy, ammortamento, ammortamentoColor, impatto, impattoColor, finRisk, finColor, vote, voteClass };
        }

        function renderAudit(assets) {
            const grid = document.getElementById('audit-grid');
            grid.innerHTML = "";

            assets.sort((a,b) => {
                let pA = a.penalty > 0 ? 0 : 1; let pB = b.penalty > 0 ? 0 : 1;
                if(pA !== pB) return pA - pB;
                let sA = calculateMatrix(a).vote === "REPLACE" ? 0 : 1; let sB = calculateMatrix(b).vote === "REPLACE" ? 0 : 1;
                return sA - sB;
            });

            assets.forEach(a => {
                let m = calculateMatrix(a);
                let incidentHtml = a.penalty > 0 ? `<div class="incident-badge"><i data-lucide="alert-octagon" class="w-3 h-3"></i> GUASTO: ${a.incident_desc} (-${a.penalty}%)</div>` : '';

                grid.innerHTML += `
                <div class="asset-card" onclick="openIncidentModal('${a.id}', '${a.source}')">
                    <div class="brand-vote ${m.voteClass}">${m.vote}</div>
                    <div>
                        <div class="text-[10px] font-bold text-teal-400 uppercase tracking-wider mb-1">${a.category} • Dal ${a.year}</div>
                        <h3 class="text-lg font-bold text-white leading-tight">${a.name}</h3>
                        <div class="text-xs text-gray-400">${a.type}</div>
                        ${incidentHtml}
                    </div>
                    <div class="mt-2 flex flex-col gap-1">
                        <div class="matrix-row"><div class="m-labels"><span>Cronologia (Vita)</span><span class="text-teal-400">${Math.round(m.chrono)}%</span></div><div class="bar-bg"><div class="h-full bar-time" style="width:${m.chrono}%"></div></div></div>
                        <div class="matrix-row"><div class="m-labels"><span>Performance</span><span class="text-[#d946ef]">${Math.round(m.perf)}%</span></div><div class="bar-bg"><div class="h-full bar-perf" style="width:${m.perf}%"></div></div></div>
                        <div class="matrix-row"><div class="m-labels"><span>Energia</span><span class="text-amber-500">${Math.round(m.energy)}%</span></div><div class="bar-bg"><div class="h-full bar-energy" style="width:${m.energy}%"></div></div></div>
                    </div>
                    <div class="risk-zone mt-auto">
                        <div class="risk-item"><span class="risk-lbl">Ammortamento</span><span class="risk-val ${m.ammortamentoColor}">${m.ammortamento}</span></div>
                        <div class="risk-item"><span class="risk-lbl">Impatto Business</span><span class="risk-val ${m.impattoColor}">${m.impatto}</span></div>
                        <div class="risk-item"><span class="risk-lbl">Rischio Finanziario</span><span class="risk-val ${m.finColor}">${m.finRisk}</span></div>
                    </div>
                </div>`;
            });
            if(window.lucide) lucide.createIcons();
        }

        // --- CRUD E PRESET LOGIC ---
        function openIncidentModal(id, source) {
            const asset = unifiedList.find(x => x.id === id && x.source === source);
            document.getElementById('i-id').value = id;
            document.getElementById('i-source').value = source;
            document.getElementById('i-asset-name').innerText = asset.name;
            document.getElementById('i-asset-type').innerText = asset.type;
            
            // Popola i pulsanti Preset specifici per l'asset
            const presetBox = document.getElementById('preset-list');
            presetBox.innerHTML = '<label>Casistiche Comuni (Seleziona per applicare)</label>';
            const specificPresets = getPresetsForCategory(asset.category, asset.name);
            
            specificPresets.forEach(p => {
                presetBox.innerHTML += `
                <div class="preset-btn" onclick="applyPresetDamage(${p.penalty}, '${p.title}')">
                    <div class="flex justify-between">
                        <span class="preset-title">${p.title}</span>
                        <span class="preset-score">-${p.penalty}% PERF</span>
                    </div>
                    <span class="preset-sub">${p.desc}</span>
                </div>`;
            });
            
            if(asset.penalty > 0) {
                document.getElementById('i-desc').value = asset.incident_desc;
                document.getElementById('i-severity').value = asset.penalty;
                document.getElementById('btn-heal').classList.remove('hidden');
            } else {
                document.getElementById('i-desc').value = '';
                document.getElementById('i-severity').value = '0';
                document.getElementById('btn-heal').classList.add('hidden');
            }
            
            document.getElementById('incidentModal').style.display = 'flex';
        }

        function applyPresetDamage(penaltyValue, descText) {
            updateAssetScore(penaltyValue, descText);
        }

        function applyDamageManual() {
            updateAssetScore(parseInt(document.getElementById('i-severity').value), document.getElementById('i-desc').value || "Danno non specificato");
        }

        function healAsset() {
            updateAssetScore(0, "");
        }

        function updateAssetScore(penaltyValue, descText) {
            const id = document.getElementById('i-id').value;
            const source = document.getElementById('i-source').value;

            if (source === 'mobile') {
                const idx = assetsMobile.findIndex(x => x.id === id);
                if(idx > -1) {
                    assetsMobile[idx].penalty = penaltyValue;
                    assetsMobile[idx].incident_desc = descText;
                    localStorage.setItem('masotto_assets_mobile_db', JSON.stringify(assetsMobile));
                }
            } else {
                const idx = assetsStruct.findIndex(x => x.id === id);
                if(idx > -1) {
                    assetsStruct[idx].penalty = penaltyValue;
                    assetsStruct[idx].incident_desc = descText;
                    localStorage.setItem('masotto_structural_assets_db', JSON.stringify(assetsStruct));
                }
            }

            closeModal();
            loadData(); // Ricarica la griglia con i nuovi calcoli 3-Matrix
        }

        function closeModal() { document.getElementById('incidentModal').style.display = 'none'; }
        window.onload = loadData;
    </script>
    
<script id="masotto-sidebar">
(function(){
  const PAGES = [
    ["index.html","Dashboard","layout-dashboard"],
    ["ANAGRAFICA.html","Anagrafica","id-card"],
    ["asset.html","Asset","boxes"],
    ["audit.html","Audit","clipboard-check"],
    ["manutenzione.html","Manutenzione","wrench"],
    ["prenotazioni.html","Prenotazioni","calendar"],
    ["FINANZE.html","Finanze","pie-chart"],
    ["sicurezza.html","Sicurezza","shield"]
  ];

  function mountSidebar(){
  if (window.__MS_SIDEBAR_DONE && document.getElementById("msSidebar")) return;
  try{ document.querySelectorAll(".ms-sidebar, [data-legacy-sidebar=\"1\"]").forEach(el=>el.remove()); }catch(e){}
  const path = (location.pathname.split("/").pop() || "index.html");
    const nav = PAGES.map(([href,label,icon])=>{
      const active = (href.toLowerCase() === path.toLowerCase()) ? "active" : "";
      return `<a class="${active}" href="${href}"><i data-lucide="${icon}" class="w-4 h-4"></i><span>${label}</span></a>`;
    }).join("");
    const sidebar = document.createElement("aside");
    sidebar.className="ms-sidebar"; sidebar.id="msSidebar";
    sidebar.innerHTML = `
      <div class="flex items-center gap-3 mb-6"><div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold shadow-lg" style="background:linear-gradient(135deg,#004D54,#10b981)">2M</div><div><div class="text-white font-bold leading-tight">Masotto Terrace</div><div class="ms-chip">single-property mode</div></div></div>
      <nav class="ms-nav space-y-1">${nav}</nav>
      `;
    const mainWrap = document.createElement("div"); mainWrap.className = "ms-main";
    while(document.body.firstChild){ mainWrap.appendChild(document.body.firstChild); }
    document.body.appendChild(sidebar); document.body.appendChild(mainWrap);
    const topbar = document.createElement("div"); topbar.className="ms-topbar p-3 flex items-center justify-between lg:hidden";
    topbar.innerHTML = `<button id="msToggle" class="px-3 py-2 rounded-lg text-white text-xs font-bold" style="background:rgba(255,255,255,.06);">☰ Menu</button><div class="text-white font-bold text-sm">Masotto Terrace</div><div style="width:64px"></div>`;
    mainWrap.prepend(topbar);
    document.getElementById("msToggle").addEventListener("click", ()=>{ sidebar.classList.toggle("open"); });
  }
  document.addEventListener("DOMContentLoaded", ()=>{ mountSidebar(); if(window.lucide) window.lucide.createIcons(); });
})();
</script>
</body>
</html>
